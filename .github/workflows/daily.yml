name: Daily Job Scraper

on:
  schedule:
    - cron: '0 0 * * *'   # KST 09:00 = UTC 00:00
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper (React profile)
        run: python job_scraper.py --config config.react.json

      - name: Run scraper (Java profile)
        run: python job_scraper.py --config config.java.json

      - name: Commit results
        run: |
          git config user.name "SungHoonGit"
          git config user.email "ksa134652@naver.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily scrape $(date +'%Y-%m-%d %H:%M')"
          git push
