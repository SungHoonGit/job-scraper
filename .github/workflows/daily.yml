name: Daily Job Scraper

on:
  schedule:
    - cron: '*/5 * * * *'   # KST 09:00 = UTC 00:00
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Create config files
        run: |
          # React profile
          cat > config.react.json << 'EOF'
          {
            "output_dir": ".",
            "retention_days": 20,
            "notification": false,
            "max_per_site": 15,
            "company_info": false,
            "profile": "react",
            "search": {
              "query": "React Next.js TypeScript 프론트엔드 개발자 서울 경기",
              "career_level": "경력",
              "career_from": 2,
              "career_to": 2,
              "exclude_closed": true
            },
            "include_titles": ["react", "next", "프론트", "frontend", "typescript", "웹개발"],
            "exclude_titles": ["TOP100", "건설", "마케팅", "생산", "회계", "인사", "QA"],
            "sites": {
              "jobkorea": { "enabled": true },
              "saramin": { "enabled": true, "category_code": "84" },
              "wanted": { "enabled": true },
              "jumpit": { "enabled": false },
              "incruit": { "enabled": false },
              "remember": { "enabled": false }
            }
          }
          EOF
          # Java profile
          cat > config.java.json << 'EOF'
          {
            "output_dir": ".",
            "retention_days": 20,
            "notification": false,
            "max_per_site": 15,
            "company_info": false,
            "profile": "java",
            "search": {
              "query": "Java Spring 백엔드 개발자 서울 경기",
              "career_level": "경력",
              "career_from": 3,
              "career_to": 5,
              "exclude_closed": true
            },
            "include_titles": ["java", "spring", "백엔드", "backend", "server"],
            "exclude_titles": ["TOP100", "건설", "마케팅", "생산", "회계", "인사", "QA", "프론트"],
            "sites": {
              "jobkorea": { "enabled": true },
              "saramin": { "enabled": true, "category_code": "84" },
              "wanted": { "enabled": true },
              "jumpit": { "enabled": false },
              "incruit": { "enabled": false },
              "remember": { "enabled": false }
            }
          }
          EOF

      - name: Run scraper (React profile)
        run: |
          cp config.react.json config.json
          python job_scraper.py --profile react

      - name: Run scraper (Java profile)
        run: |
          cp config.java.json config.json
          python job_scraper.py --profile java

      - name: Commit results
        run: |
          git config user.name "SungHoonGit"
          git config user.email "ksa134652@naver.com"
          git add -A
          git diff --cached --quiet || git commit -m "daily scrape $(date +'%Y-%m-%d %H:%M')"
          git push


