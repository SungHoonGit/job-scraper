name: Deploy to OCI

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.95.162
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/ubuntu/job-scraper
            git pull
            pip3 install requests beautifulsoup4 lxml -q --break-system-packages
            echo "Deploy complete!"
